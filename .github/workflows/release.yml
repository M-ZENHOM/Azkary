name: Build and Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --ignore-scripts
        env:
          npm_config_platform: ${{ matrix.os == 'windows-latest' && 'win32' || 'darwin' }}
          npm_config_arch: x64

      - name: Build application (Windows)
        if: matrix.os == 'windows-latest'
        run: bun run build-only && bunx electron-builder --win --config.compression=normal
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Build application (macOS)
        if: matrix.os == 'macos-latest'
        run: bun run build-only && bunx electron-builder --mac --config.compression=normal
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: List build output
        run: |
          echo "Build output structure:"
          find release -type f -name "*.exe" -o -name "*.dmg" -o -name "*.zip" | head -20

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/
          retention-days: 30

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: ./release-windows
        continue-on-error: true

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: ./release-macos
        continue-on-error: true

      - name: List available files
        run: |
          echo "Windows files:"
          find ./release-windows -type f -name "*.exe" || echo "No Windows exe files found"
          echo "macOS files:"
          find ./release-macos -type f -name "*.dmg" -o -name "*.zip" || echo "No macOS files found"
          echo "All files in release directories:"
          find ./release-windows ./release-macos -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./release-windows/**/*.exe
            ./release-macos/**/*.dmg
            ./release-macos/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
