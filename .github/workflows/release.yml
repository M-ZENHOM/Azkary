name: Build and Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
        env:
          npm_config_platform: win32
          npm_config_arch: x64

      - name: Build Windows
        run: npm run build-only && npx electron-builder --win --publish always --config.compression=normal
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
        env:
          npm_config_platform: darwin
          npm_config_arch: x64

      - name: Build macOS
        run: npm run build-only && npx electron-builder --mac --publish always --config.compression=normal
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
